name: test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install project and development dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes ripgrep
          python -m pip install -e '.[dev,browser,semantic]'
          python -m playwright install --with-deps chromium

      - name: Run Ruff checks
        run: |
          ruff check agent tests scripts
          ruff format --check agent tests scripts

      - name: Run tests
        run: python -m pytest

      - name: Compile Python sources
        run: python -m compileall -q agent tests scripts
